<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SST em Cloud - Drive de Segurança do Trabalho</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <meta name="description" content="A ferramenta ideal para gerenciar e escalar suas vendas online." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#38bdf8',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
              900: '#1e3a8a',
            }
          },
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'scroll': 'scroll 40s linear infinite',
            'bounce-slow': 'bounce 3s infinite',
            'draw-x-loop': 'draw-x-loop 4s ease-in-out infinite',
            'draw-loop': 'draw-loop 4s ease-in-out infinite',
            'fadeIn': 'fadeIn 0.5s ease-out forwards',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            scroll: {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-50%)' },
            },
            shimmer: {
              '100%': { transform: 'translateX(100%)' },
            },
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    /* Cloud Divider CSS */
    .cloud-divider {
      position: absolute;
      left: 0;
      width: 100%;
      overflow: hidden;
      line-height: 0;
      z-index: 20;
      height: 80px;
    }

    @media (min-width: 768px) {
      .cloud-divider {
        height: 140px;
      }
    }

    @media (min-width: 1280px) {
      .cloud-divider {
        height: 180px;
      }
    }

    .cloud-divider svg {
      display: block;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0px 2px 2px rgba(0, 0, 0, 0.05));
    }

    /* --- Animações de Desenho (Preço) --- */

    /* Configuração inicial dos traços */
    .draw-x path {
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
    }

    .draw-circle path {
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
    }

    /* Classes de Animação com duração de 4s para sincronizar o loop */
    .animate-draw-x-loop path {
      animation: draw-x-loop 4s ease-in-out infinite;
    }

    .animate-draw-loop path {
      animation: draw-loop 4s ease-in-out infinite;
    }

    /* Pequeno delay no segundo traço do X */
    .animate-draw-x-loop path:nth-child(2) {
      animation-delay: 0.1s;
    }

    /* 
         LÓGICA DO TEMPO (Ciclo de 4 segundos):
         0% - 15%: X desenha
         15% - 35%: Círculo desenha (enquanto X espera visível)
         35% - 85%: Ambos ficam parados visíveis
         85% - 95%: Ambos desaparecem (Fade out)
         100%: Reset
      */

    @keyframes draw-x-loop {
      0% {
        stroke-dashoffset: 200;
        opacity: 0;
      }

      5% {
        opacity: 1;
      }

      15% {
        stroke-dashoffset: 0;
      }

      /* Termina de riscar cedo */
      85% {
        stroke-dashoffset: 0;
        opacity: 1;
      }

      /* Fica visível até o final do ciclo */
      95% {
        opacity: 0;
      }

      100% {
        stroke-dashoffset: 200;
        opacity: 0;
      }
    }

    @keyframes draw-loop {
      0% {
        stroke-dashoffset: 600;
        opacity: 0;
      }

      15% {
        stroke-dashoffset: 600;
        opacity: 0;
      }

      /* Espera o X terminar */
      16% {
        opacity: 1;
      }

      /* Aparece para começar a desenhar */
      35% {
        stroke-dashoffset: 0;
      }

      /* Termina de circular */
      85% {
        stroke-dashoffset: 0;
        opacity: 1;
      }

      /* Fica visível junto com o X */
      95% {
        opacity: 0;
      }

      100% {
        stroke-dashoffset: 600;
        opacity: 0;
      }
    }

    /* --- Utilitários para Flip Card 3D --- */
    .perspective-1000 {
      perspective: 1000px;
    }

    .transform-style-3d {
      transform-style: preserve-3d;
    }

    .backface-hidden {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .rotate-y-180 {
      transform: rotateY(180deg);
    }

    .group:hover .group-hover\:rotate-y-180 {
      transform: rotateY(180deg);
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.560.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
